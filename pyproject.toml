[tool.uv.workspace]
members = ["projects/barf", "scripts"]

[tool.ty.src]
include = ["projects/barf"]
# Not ty-clean yet; drop these from the exclude list as they get fixed.
# Tests are excluded because their duck-typed fakes (SimpleNamespace
# hosts etc.) are intentional.
exclude = [
    "projects/barf/barf/cli/generate.py",
    "projects/barf/barf/model/wireguard.py",
    "projects/barf/barf/util/netbox.py",
    "projects/barf/tests",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["barf"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "ruff>=0.15.18",
]
