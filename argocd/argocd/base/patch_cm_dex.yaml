apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
  name: argocd-cm
  namespace: argocd
data:
  dex.config: |
    logger:
      level: debug
    connectors:
    - type: oidc
      id: authentik
      name: authentik
      config:
        issuer: $argocd-oidc:oidc_issuer
        clientID: $argocd-oidc:oidc_id
        clientSecret: $argocd-oidc:oidc_secret
        insecureEnableGroups: true
        insecureSkipEmailVerified: true
        scopes:
          - openid
          - profile
          - email

