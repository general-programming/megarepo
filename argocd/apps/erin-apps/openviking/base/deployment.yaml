apiVersion: apps/v1
kind: Deployment
metadata:
  name: openviking
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openviking
  template:
    metadata:
      labels:
        app: openviking
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: openviking
          image: ghcr.io/volcengine/openviking:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 1933
              name: http
          env:
            - name: OPENVIKING_ROOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openviking-secrets
                  key: root-api-key
            - name: OPENVIKING_OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openviking-secrets
                  key: openrouter-api-key
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /app/.openviking
            - name: config
              mountPath: /app/.openviking/ov.conf
              subPath: ov.conf
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            # /health can stall behind a slow (~10s) embedder call on the
            # single worker; keep liveness lenient so transient slowness
            # never triggers a restart loop.
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            # NOTE: /ready couples to the embedder, which is chronically slow
            # (OpenRouter qwen3-embedding-8b ~10s/call) and returns 503 ~half
            # the time even though the app serves real traffic fine (ov ls /
            # find / import all succeed). With workers:1 (local vectordb/agfs
            # rules out multi-worker) a burst of consecutive /ready failures
            # drops the pod from the Service and surfaces 502s through the
            # Tailscale ingress. Gate readiness on /health instead — a
            # process-can-serve signal that stays green whenever the pod can
            # actually answer — so Service membership no longer tracks the
            # slow embedder. (Underlying fix is a faster embedding backend.)
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openviking-data
        - name: config
          configMap:
            name: openviking-config
