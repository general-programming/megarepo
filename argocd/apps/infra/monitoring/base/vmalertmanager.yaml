---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanager
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicaCount: 1
  # Discover all VMAlertmanagerConfig resources in this namespace.
  # Empty selector matches all labels.
  configSelector: {}
  configNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: monitoring
  # Public routing config lives here in the repo.
  # Private receiver config (webhook URLs) lives in VMAlertmanagerConfig,
  # which references secrets synced from Vault.
  configRawYaml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: blackhole
      group_by: ['alertname', 'cluster', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
      - name: blackhole
