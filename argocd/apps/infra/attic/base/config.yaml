apiVersion: v1
kind: ConfigMap
metadata:
  name: attic-config
data:
  server.toml: |
    listen = "[::]:8080"
    api-endpoint = "https://attic.owo.me/"

    # url comes from ATTIC_SERVER_DATABASE_URL (CNPG app secret); the section
    # itself must exist for the config to parse. The RS256 token secret comes
    # from ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64.
    [database]

    [storage]
    type = "s3"
    region = "us-east-1"
    bucket = "attic"
    # Must be resolvable by cache clients too: single-chunk NARs are served
    # as 307 redirects to pre-signed URLs on this endpoint.
    endpoint = "http://rgw-fmt2.generalprogramming.org"

    [chunking]
    nar-size-threshold = 65536
    min-size = 16384
    avg-size = 65536
    max-size = 262144

    [compression]
    type = "zstd"

    [garbage-collection]
    interval = "12 hours"
    default-retention-period = "3 months"
