apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ceph
resources:
  - ceph_external.yaml
  - ceph_storageclass.yaml
  - create_secrets.yaml
helmCharts:
  - name: rook-ceph
    releaseName: rook-ceph
    repo: https://charts.rook.io/release
    version: v1.20.1
    valuesFile: rook_values.yaml
    namespace: ceph
  - name: ceph-csi-drivers
    releaseName: ceph-csi-drivers
    repo: https://ceph.github.io/ceph-csi-operator
    version: 1.0.4
    valuesFile: rook_csi_values.yaml
    namespace: ceph
