apiVersion: operator.victoriametrics.com/v1beta1
kind: VMCluster
metadata:
  name: sea1-victoriametrics
  namespace: victoriametrics
spec:
  # Add fields here
  retentionPeriod: "4"
  replicationFactor: 2
  vmstorage:
    replicaCount: 3
    # Storage holds the TSDB data (replicationFactor 2), so hard-spread the 3
    # replicas across nodes — never let one node hold two copies.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: vmstorage
    storageDataPath: "/vm-data"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-rbd
          resources:
            requests:
              storage: 128Gi
    resources:
      limits:
        cpu: "2"
        memory: 1Gi
  vmselect:
    replicaCount: 3
    # Stateless query tier — prefer spreading but stay available under
    # disruption rather than blocking a pod from scheduling.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: vmselect
    cacheMountPath: "/select-cache"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-rbd
          resources:
            requests:
              storage: 2Gi
    resources:
      limits:
        cpu: "2"
        memory: "1Gi"
    serviceSpec:
      spec:
        type: ClusterIP
      metadata:
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: "svc-vmselect-sea1"
  vminsert:
    replicaCount: 3
    # Stateless ingest tier — prefer spreading but never block ingestion.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: vminsert
    serviceSpec:
      spec:
        type: ClusterIP
      metadata:
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: "svc-vminsert-sea1"
    insertPorts:
      influxPort: "8089"
      graphitePort: "2003"
