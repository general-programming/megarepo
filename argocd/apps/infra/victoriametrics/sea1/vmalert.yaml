apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlert
metadata:
  name: vmalert
  namespace: victoriametrics
spec:
  replicaCount: 1
  # Note: sea1 vmagent ships metrics to fmt2 vminsert.
  # If alerting against sea1-originating metrics, point datasource to fmt2 vmselect instead:
  #   http://vmselect.fmt2.generalprogramming.org:8481/select/0/prometheus
  datasource:
    url: "http://vmselect-sea1-victoriametrics.victoriametrics.svc.cluster.local:8481/select/0/prometheus"
  notifier:
    url: "http://vmalertmanager-alertmanager.monitoring.svc.cluster.local:9093"
  remoteWrite:
    url: "http://vminsert-sea1-victoriametrics.victoriametrics.svc.cluster.local:8480/insert/0/prometheus"
  # Select all VMRule resources across all namespaces.
  selectAllByDefault: true
  evaluationInterval: 1m
  # Alert "Source" links (Discord/IRM) use this instead of the pod hostname.
  extraArgs:
    external.url: "http://svc-vmalert-sea1.tail285d8f.ts.net:8080"
  serviceSpec:
    spec:
      type: ClusterIP
    metadata:
      annotations:
        tailscale.com/expose: "true"
        tailscale.com/hostname: "svc-vmalert-sea1"
