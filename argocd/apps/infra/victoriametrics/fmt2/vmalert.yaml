apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlert
metadata:
  name: vmalert
  namespace: victoriametrics
spec:
  replicaCount: 1
  datasource:
    url: "http://vmselect-fmt2-victoriametrics.victoriametrics.svc.cluster.local:8481/select/0/prometheus"
  notifier:
    url: "http://vmalertmanager-alertmanager.monitoring.svc.cluster.local:9093"
  remoteWrite:
    url: "http://vminsert-fmt2-victoriametrics.victoriametrics.svc.cluster.local:8480/insert/0/prometheus"
  # Select all VMRule resources across all namespaces.
  selectAllByDefault: true
  evaluationInterval: 1m
  # Alert "Source" links (Discord/IRM) use this instead of the pod hostname.
  extraArgs:
    external.url: "http://svc-vmalert-fmt2.tail285d8f.ts.net:8080"
  serviceSpec:
    spec:
      type: ClusterIP
    metadata:
      annotations:
        tailscale.com/expose: "true"
        tailscale.com/hostname: "svc-vmalert-fmt2"
