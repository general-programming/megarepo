apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: argocd-alerts
  namespace: victoriametrics
spec:
  groups:
    - name: argocd
      interval: 30s
      rules:
        - alert: ArgoCDApplicationSyncFailure
          expr: |
            increase(argocd_app_sync_total{phase="Failed"}[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD application sync failed ({{ $labels.name }})"
            description: "Application {{ $labels.name }} in {{ $labels.namespace }} has failed to sync. Check ArgoCD UI or logs for details."

        - alert: ArgoCDApplicationOutOfSync
          expr: |
            argocd_app_info{sync_status!="Synced"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD application out of sync ({{ $labels.name }})"
            description: "Application {{ $labels.name }} in {{ $labels.namespace }} has been out of sync for more than 15 minutes. Current sync status: {{ $labels.sync_status }}"

        - alert: ArgoCDApplicationHealthDegraded
          expr: |
            argocd_app_info{health_status!="Healthy"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD application health degraded ({{ $labels.name }})"
            description: "Application {{ $labels.name }} in {{ $labels.namespace }} is not healthy. Current health status: {{ $labels.health_status }}"

        - alert: ArgoCDApplicationReconciliationSlowdown
          expr: |
            histogram_quantile(0.95, rate(argocd_app_reconcile_seconds_bucket[5m])) > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD application reconciliation taking longer than expected"
            description: "95th percentile reconciliation time is {{ $value | humanize }}s, threshold is 30s. This may indicate performance issues."

        - alert: ArgoCDClusterConnectionIssue
          expr: |
            argocd_cluster_connection_status{server!~".*kubernetes.default.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD cluster connection failed ({{ $labels.server }})"
            description: "Unable to connect to cluster {{ $labels.server }} for more than 5 minutes."

        - alert: ArgoCDGitOperationLatency
          expr: |
            histogram_quantile(0.99, rate(argocd_git_request_duration_seconds_bucket[5m])) > 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD git operations are slow"
            description: "99th percentile git request latency is {{ $value | humanize }}s, threshold is 10s. This may indicate issues with the git repository or network connectivity."

        - alert: ArgoCDClusterCacheStale
          expr: |
            argocd_cluster_cache_age_seconds > 300
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD cluster cache is stale ({{ $labels.server }})"
            description: "Cluster {{ $labels.server }} cache age is {{ $value | humanize }}s (>5 minutes), sync status may not be accurate."

        - alert: ArgoCDOrphanedResources
          expr: |
            argocd_app_orphaned_resources_count > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD application has orphaned resources ({{ $labels.name }})"
            description: "Application {{ $labels.name }} has {{ $value | humanize }} orphaned resources. These should be cleaned up to avoid resource leaks."

        - alert: ArgoCDApplicationSetReconciliationSlowdown
          expr: |
            histogram_quantile(0.95, rate(argocd_appset_reconcile_seconds_bucket[5m])) > 60
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD ApplicationSet reconciliation taking longer than expected"
            description: "95th percentile ApplicationSet reconciliation time is {{ $value | humanize }}s, threshold is 60s. This may indicate performance issues."
