apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: smart-disks
  namespace: victoriametrics
spec:
  groups:
    - name: smart-disks
      rules:
        - alert: SmartDeviceUnhealthy
          expr: smartctl_device_smart_status == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "SMART reports unhealthy disk {{ $labels.device }} on {{ $labels.instance }}"
            description: "Disk {{ $labels.device }} on {{ $labels.instance }} fails its SMART overall-health self-assessment. Replace it."

        - alert: SmartReallocatedSectorsGrowing
          expr: increase(smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct", attribute_value_type="raw"}[24h]) > 0
          labels:
            severity: warning
          annotations:
            summary: "Reallocated sectors growing on {{ $labels.device }} ({{ $labels.instance }})"
            description: "Disk {{ $labels.device }} on {{ $labels.instance }} gained {{ $value }} reallocated sectors in the last 24h. The drive is remapping bad sectors and may be failing."

        - alert: SmartPendingSectors
          expr: smartctl_device_attribute{attribute_name="Current_Pending_Sector", attribute_value_type="raw"} > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Pending sectors on {{ $labels.device }} ({{ $labels.instance }})"
            description: "Disk {{ $labels.device }} on {{ $labels.instance }} has {{ $value }} current pending sectors (unreadable, awaiting remap)."

        - alert: SmartctlExporterDown
          expr: up{job="smartctl-exporter"} == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "smartctl-exporter down on {{ $labels.instance }}"
            description: "The smartctl-exporter on {{ $labels.instance }} is not scrapeable; SMART monitoring is blind on this host."

        - alert: NodeTextfileCollectorError
          expr: node_textfile_scrape_error == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "node-exporter textfile collector error on {{ $labels.instance }}"
            description: "The textfile collector on {{ $labels.instance }} is failing to parse one of its .prom files; custom metrics (IPMI) may be missing or stale."
