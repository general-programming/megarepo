apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: smart-disks
  namespace: victoriametrics
spec:
  groups:
    - name: smart-disks
      rules:
        - alert: SmartDeviceUnhealthy
          expr: smartmon_device_smart_healthy == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "SMART reports unhealthy disk {{ $labels.disk }} on {{ $labels.instance }}"
            description: "Disk {{ $labels.disk }} (type {{ $labels.type }}) on {{ $labels.instance }} fails its SMART overall-health self-assessment. Replace it."

        - alert: SmartReallocatedSectorsGrowing
          expr: increase(smartmon_reallocated_sector_ct_raw_value[24h]) > 0
          labels:
            severity: warning
          annotations:
            summary: "Reallocated sectors growing on {{ $labels.disk }} ({{ $labels.instance }})"
            description: "Disk {{ $labels.disk }} on {{ $labels.instance }} gained {{ $value }} reallocated sectors in the last 24h. The drive is remapping bad sectors and may be failing."

        - alert: SmartPendingSectors
          expr: smartmon_current_pending_sector_raw_value > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Pending sectors on {{ $labels.disk }} ({{ $labels.instance }})"
            description: "Disk {{ $labels.disk }} on {{ $labels.instance }} has {{ $value }} current pending sectors (unreadable, awaiting remap)."

        - alert: NodeTextfileCollectorError
          expr: node_textfile_scrape_error == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "node-exporter textfile collector error on {{ $labels.instance }}"
            description: "The textfile collector on {{ $labels.instance }} is failing to parse one of its .prom files; custom metrics (SMART, IPMI) may be missing or stale."

        - alert: SmartMetricsStale
          expr: time() - node_textfile_mtime_seconds{file=~".*smartmon.prom"} > 1800
          labels:
            severity: warning
          annotations:
            summary: "SMART metrics stale on {{ $labels.instance }}"
            description: "smartmon.prom on {{ $labels.instance }} has not been updated for over 30 minutes; the prom_smartmon cron job is probably broken. SMART monitoring is blind on this host."
