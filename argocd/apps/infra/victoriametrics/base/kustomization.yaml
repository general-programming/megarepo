apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: victoriametrics
resources:
  - github.com/VictoriaMetrics/operator/config/base-with-webhook?ref=v0.68.1
  - agent_scrape_pod.yaml
  - agent_scrape_service.yaml
  - agent_scrape_state_metrics.yaml
  - agent_scrape_kubelet.yaml
  - agent_scrape_node_exporter.yaml
images:
- name: manager
  newName: victoriametrics/operator
  newTag: v0.68.1
patches:
  # Patch the ValidatingWebhookConfiguration so cert-manager's CA injector
  # populates the caBundle fields from the vm-serving-cert Certificate.
  # Uses an explicit target+JSON patch instead of strategic merge patch to
  # avoid namespace-matching issues with cluster-scoped resources.
  - target:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingWebhookConfiguration
      name: vm-validating-webhook-configuration
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/inject-ca-from: victoriametrics/vm-serving-cert
