---
apiVersion: clickhouse.com/v1alpha1
kind: KeeperCluster
metadata:
  name: sentry
spec:
  replicas: 3
  # Keep the 3 Raft members on distinct nodes so one node loss never takes
  # quorum (was landing 2/3 on sea1-k8s-0).
  podTemplate:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: sentry-keeper
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 32Gi
---
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: sentry
spec:
  replicas: 2
  # Spread the 2 server replicas across nodes so a single node loss can't take
  # both copies of a shard.
  podTemplate:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: sentry-clickhouse
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 32Gi
  keeperClusterRef:
    name: sentry
  containerTemplate:
    image:
      repository: clickhouse/clickhouse-server
      tag: "25.3"
    resources:
      requests:
        cpu: "1"
        memory: "6Gi"
      limits:
        cpu: "2"
        memory: "8Gi"
