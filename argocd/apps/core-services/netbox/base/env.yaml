---
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-env
data:
  SKIP_STARTUP_SCRIPTS: "true"
  DB_WAIT_DEBUG: "1"
  # SECRET_KEY in vault

  # Superuser, secrets
  SUPERUSER_EMAIL: nepeat@generalprogramming.org
  # SUPERUSER_API_TOKEN in vault

  # NAPALM
  NAPALM_USERNAME: netbox
  # NAPALM_PASSWORD in vault

  # Other
  CORS_ORIGIN_WHITELIST: https://netbox.generalprogramming.org
  METRICS_ENABLED: "1"
  WEBHOOKS_ENABLED: "true"
  MEDIA_ROOT: /opt/netbox/netbox/media

  # Redis
  REDIS_HOST: netbox-redis

  # Auth backends
  REMOTE_AUTH_ENABLED: "true"
  REMOTE_AUTH_BACKEND: "social_core.backends.open_id_connect.OpenIdConnectAuth"

  # OIDC
  SOCIAL_AUTH_OIDC_OIDC_ENDPOINT: "https://auth.owo.me/application/o/netbox/"
  SOCIAL_AUTH_OIDC_KEY: netbox
  SOCIAL_AUTH_OIDC_SCOPE: openid profile email roles
  LOGOUT_REDIRECT_URL: "https://auth.owo.me/application/o/netbox/end-session"

  NETBOX_DELETE_LEGACY_DATA: "1"
