---
name: librenms-docker

on:
  push:
    branches: [main]
    paths:
      - "services/librenms/Dockerfile"
      - ".github/workflows/librenms-docker.yaml"
  schedule:
    # Weekly rebuild to pick up upstream librenms/librenms:latest changes.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: librenms-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/general-programming/megarepo/librenms

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v7
        with:
          context: services/librenms
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
