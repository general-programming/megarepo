---
name: coder-nix-workspace-docker

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/coder/nix-template/image/Dockerfile"
      - ".github/workflows/coder-nix-workspace-docker.yaml"
  schedule:
    # Weekly rebuild to pick up upstream ubuntu:26.04 and Nix installer changes.
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: coder-nix-workspace-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/general-programming/megarepo/coder-nix-workspace

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v7
        with:
          context: infrastructure/coder/nix-template/image
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
