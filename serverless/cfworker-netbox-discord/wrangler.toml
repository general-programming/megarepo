name = "netbox-discord"
main = "./index.js"
workers_dev = true
compatibility_date = "2026-03-01"
usage_model = "bundled"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
