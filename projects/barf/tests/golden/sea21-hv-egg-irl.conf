protocol bgp sea1_vpn_spine_2 from genprog_fabric {
	# Passive: the FRR side dials our link-local once it sees an RA.
	interface "wg51401";
	neighbor range fe80::/10 as 4280805529;
	dynamic name "sea1_vpn_spine_2_";
