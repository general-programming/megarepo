cat << 'BARF_FILE' > /etc/bird/bird.conf
# /etc/bird/bird.conf - barf-managed bird2 base for sea21-hv-egg-irl.
# DO NOT HAND-EDIT: `barf config deploy sea21-hv-egg-irl` overwrites it.
#
# This file owns only the plumbing: logging, router id, and the
# device/kernel protocols. Routing policy and the BGP fabric live in
# drop-ins, included in GLOB (alphabetical) order:
#   /etc/bird/conf.d/00-local.conf -- this host's hand-written config,
#                                     tracked in network.yml (`bird:
#                                     local_conf`). Sorts first so its
#                                     definitions (e.g. the import
#                                     filter genprog references) parse
#                                     before genprog.conf.
#   /etc/bird/conf.d/genprog.conf  -- the barf-managed fabric.
#   /etc/bird/conf.d/<anything else> -- yours; barf never touches it.
log syslog all;
router id 192.168.3.1;

protocol device {
	scan time 10;
}

protocol kernel {
	merge paths on;
	ipv4 {
		export filter {
			# Static routes are genprog_originate's announce anchors
			# (reject routes); installing them would blackhole the
			# very prefixes this host serves.
			if source = RTS_STATIC then reject;
			# Pin the source address of fabric-learned routes so
			# host-originated traffic uses our announced identity
			# (unnumbered links leave nothing else to pick from).
			krt_prefsrc = 192.168.3.1;
			accept;
		};
	};
}

protocol kernel {
	ipv6 {
		export where source != RTS_STATIC;
	};
}

include "/etc/bird/conf.d/*.conf";
BARF_FILE

cat << 'BARF_FILE' > /etc/bird/conf.d/00-local.conf
# /etc/bird/conf.d/00-local.conf - sea21-hv-egg-irl's hand-written
# bird config, tracked in network.yml (bird: local_conf). Sorts
# before genprog.conf so is_blacklisted() parses first.
timeformat base         iso long;
timeformat log          iso long;
timeformat protocol     iso long;
timeformat route        iso long;

# Mesh (wg1/wg2) connected routes into bird's tables.
protocol direct {
        ipv4;
        interface "wg*";
}

############################# ERIN!
#### YOU ARE NOT ALLOWED TO TOUCH THE FUNCTION BELOW
#### ASK LINUX IF YOU WANT TO UPDATE
#### OR LINUX WILL REMOVE BIRD ENTIRELY FROM THIS HOST
function is_blacklisted()
prefix set no_erin_no;
{
        no_erin_no = [
                # WG1 INTERFACE, GENPROG MANAGED
                172.19.69.0/24,

                # WG2 INTERFACE, GENPROG MANAGED
                172.19.79.0/24,

                # VMBR1, GENPROG MANAGED
                192.168.3.0/24,

                # PART OF WG1, UNKNOWN MAINTAINER
                192.168.40.0/24,

                # PART OF WG1, UNKNOWN MAINTAINER
                192.168.88.0/24
        ];

        if net ~ no_erin_no then return true;

        return false;
}
BARF_FILE

cat << 'BARF_FILE' > /etc/bird/conf.d/genprog.conf
# /etc/bird/conf.d/genprog.conf - barf-managed fabric for sea21-hv-egg-irl.
# DO NOT HAND-EDIT: `barf config deploy sea21-hv-egg-irl` overwrites it.
#
# Contents:
#   GENPROG_ASN       -- this host's ASN from network.yml.
#   genprog_export    -- what the fabric hears from us: our originated
#                        prefixes plus routes learned over BGP.
#   genprog_originate -- static (reject) anchors for network.yml
#                        `networks:`; bird only exports routes that
#                        exist in a table, so announcing a prefix means
#                        anchoring it here. The base config keeps these
#                        anchors out of the kernel.
#   genprog_fabric    -- shared session settings; every WireGuard
#                        fabric link gets one `protocol bgp` from it.
#   radv              -- RA beacon on unnumbered interfaces. FRR's
#                        `neighbor <if> interface v6only` learns its
#                        peer from received RAs; without this beacon
#                        the VyOS side idles forever. `default
#                        lifetime 0` = never advertise as a gateway.
#   bfd               -- fast liveness on the wg fabric interfaces.
#
# Unnumbered links (RFC 5549): one IPv6 link-local session per
# interface carries BOTH address families; IPv4 routes ride IPv6
# next-hops via the extended-nexthop capability, and the kernel
# installs them as `via inet6 fe80::...`. Numbered links keep the
# classic session on the link /31.
#
# Geographic BGP path weighting: source = RTS_STATIC (our own
# originated prefixes) get a large-community origin tag when this
# host has a `site`; genprog_import_<neighbor site> filters below set
# bgp_local_pref per origin-site tag on the way in. See
# barf/util/sites.py for the distance math -- routers only see the
# already-computed integers.
define GENPROG_ASN = 4280805528;


filter genprog_export {
	if source = RTS_STATIC then {
		bgp_large_community.add((4280805525, 1, 1));
		accept;
	}
	if source = RTS_BGP then accept;
	reject;
}

filter genprog_import_fmt2 {
	if is_blacklisted() then reject "REJECTED ", net, " from ", proto, " blacklisted";
	if bgp_large_community ~ [(4280805525, 1, 1)] then {
		bgp_local_pref = 997762;
		accept;
	}
	if bgp_large_community ~ [(4280805525, 1, 2)] then {
		bgp_local_pref = 998881;
		accept;
	}
	if bgp_large_community ~ [(4280805525, 1, 3)] then {
		bgp_local_pref = 995947;
		accept;
	}
	if bgp_large_community ~ [(4280805525, 1, 4)] then {
		bgp_local_pref = 995028;
		accept;
	}
	accept;
}

filter genprog_import_sea {
	if is_blacklisted() then reject "REJECTED ", net, " from ", proto, " blacklisted";
	if bgp_large_community ~ [(4280805525, 1, 1)] then {
		bgp_local_pref = 1000000;
		accept;
	}
	if bgp_large_community ~ [(4280805525, 1, 2)] then {
		bgp_local_pref = 998881;
		accept;
	}
	if bgp_large_community ~ [(4280805525, 1, 3)] then {
		bgp_local_pref = 997237;
		accept;
	}
	if bgp_large_community ~ [(4280805525, 1, 4)] then {
		bgp_local_pref = 996297;
		accept;
	}
	accept;
}

protocol static genprog_originate {
	ipv4;
	route 192.168.3.0/24 reject;
	route 172.19.69.0/24 reject;
	route 172.19.70.0/24 reject;
}

protocol static genprog_originate6 {
	ipv6;
	route 2602:fa6d:f:aaaa::f06/128 reject;
}

template bgp genprog_fabric {
	local as GENPROG_ASN;
	hold time 30;
	keepalive time 10;
	ipv4 {
		import filter {
		if is_blacklisted() then reject "REJECTED ", net, " from ", proto, " blacklisted";
		accept;
	};
		export filter genprog_export;
		next hop self;
		extended next hop on;
	};
	ipv6 {
		import filter {
		if is_blacklisted() then reject "REJECTED ", net, " from ", proto, " blacklisted";
		accept;
	};
		export filter genprog_export;
		next hop self;
	};
}

protocol bgp fmt2_vpn_spine_1 from genprog_fabric {
	# Passive: the FRR side dials our link-local once it sees an RA.
	interface "wg51070";
	neighbor range fe80::/10 as 4280805525;
	dynamic name "fmt2_vpn_spine_1_";
	# Geographic weighting: this neighbor is in site fmt2.
	ipv4 {
		import filter genprog_import_fmt2;
		export filter genprog_export;
		next hop self;
		extended next hop on;
	};
	ipv6 {
		import filter genprog_import_fmt2;
		export filter genprog_export;
		next hop self;
	};
}

protocol bgp fmt2_vpn_spine_2 from genprog_fabric {
