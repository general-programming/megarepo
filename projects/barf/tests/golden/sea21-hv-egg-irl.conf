		export filter genprog_export;
		next hop self;
		extended next hop on;
	};
	ipv6 {
		import filter genprog_import_sea;
		export filter genprog_export;
		next hop self;
	};
}

protocol radv {
	interface "wg51070", "wg51134", "wg51399", "wg51401" {
		max ra interval 15;
		default lifetime 0;
	};
}

protocol bfd {
	interface "wg*" {
		min rx interval 150 ms;
		min tx interval 150 ms;
		idle tx interval 1500 ms;
	};
}
BARF_FILE

birdc configure

