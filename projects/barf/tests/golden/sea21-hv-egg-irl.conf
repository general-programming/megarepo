	};
}

protocol bgp sea1_vpn_spine_1 from genprog_fabric {
	# Passive: the FRR side dials our link-local once it sees an RA.
	interface "wg51399";
	neighbor range fe80::/10 as 4280805529;
	dynamic name "sea1_vpn_spine_1_";
	# Geographic weighting: this neighbor is in site sea.
	ipv4 {
		import filter genprog_import_sea;
		export filter genprog_export;
		next hop self;
		extended next hop on;
	};
	ipv6 {
		import filter genprog_import_sea;
		export filter genprog_export;
