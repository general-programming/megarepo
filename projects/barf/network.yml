  sea21-hv-egg-irl:
    id: 6
    address: 209.251.245.111
    asn: 4280805528
    type: linux
    role: vpn
    # Prefixes this host originates into the fabric (bird static
    # anchors in conf.d/genprog.conf).
    networks:
      - 192.168.3.0/24
      - 172.19.69.0/24
      - 172.19.70.0/24
    bird:
      router_id: 192.168.3.1
      # ECMP the two spines and pin hv-originated traffic to the
      # announced vmbr1 identity (unnumbered links have no address
      # the kernel could pick as a source).
      merge_paths: true
      krt_prefsrc: 192.168.3.1
      # ERIN's prefix blacklist; defined in local_conf below, which
      # barf deploys as /etc/bird/conf.d/00-local.conf.
      import_filter: imp_fil
      local_conf: |
        # /etc/bird/conf.d/00-local.conf - sea21-hv-egg-irl's hand-written
        # bird config, tracked in network.yml (bird: local_conf). Sorts
        # before genprog.conf so imp_fil parses first.
        timeformat base         iso long;
        timeformat log          iso long;
        timeformat protocol     iso long;
        timeformat route        iso long;

        # Mesh (wg1/wg2) connected routes into bird's tables.
        protocol direct {
                ipv4;
                interface "wg*";
        }

        ############################# ERIN!
        #### YOU ARE NOT ALLOWED TO TOUCH THE FUNCTION BELOW
        #### ASK LINUX IF YOU WANT TO UPDATE
        #### OR LINUX WILL REMOVE BIRD ENTIRELY FROM THIS HOST
        function is_blacklisted()
        prefix set no_erin_no;
        {
                no_erin_no = [
                        # WG1 INTERFACE, GENPROG MANAGED
                        172.19.69.0/24,

                        # WG2 INTERFACE, GENPROG MANAGED
                        172.19.79.0/24,

                        # VMBR1, GENPROG MANAGED
                        192.168.3.0/24,

                        # PART OF WG1, UNKNOWN MAINTAINER
                        192.168.40.0/24,

                        # PART OF WG1, UNKNOWN MAINTAINER
                        192.168.88.0/24
                ];

                if net ~ no_erin_no then return true;

                return false;
        }

        filter imp_fil {
                if is_blacklisted() then
                        reject "REJECTED ", net, " from ", proto, " BGP BANNED PREFIX";

                accept;
        }
